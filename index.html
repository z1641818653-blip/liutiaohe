<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#3d4f2e">
    <link rel="manifest" href="manifest.json">
    <title>柳条河生态游乐场 - 野外自助烧烤点餐</title>
    <style>
        :root {
            --primary: #e67e22;
            --primary-dark: #d35400;
            --bg: #f4f1ea;
            --card-bg: #fffef9;
            --text: #3e3226;
            --text-light: #7a6f64;
            --border: #e0d7c4;
            --shadow: 0 2px 12px rgba(62, 50, 38, 0.08);
            --shadow-lg: 0 4px 24px rgba(62, 50, 38, 0.12);
            --radius: 16px;
            --radius-sm: 12px;
            --transition: 0.2s ease;
            --green: #5a8f4b;
            --green-dark: #3d6b32;
            --red: #c0392b;
            --blue: #2980b9;
            --yellow: #d4a017;
            --gray: #95a5a6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(ellipse at 20% 50%, rgba(90, 143, 75, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(230, 126, 34, 0.04) 0%, transparent 50%);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            font-size: 15px;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        /* ============ 顶部导航 ============ */
        .navbar {
            background: linear-gradient(135deg, #3d4f2e 0%, #2c3a1f 100%);
            padding: 0 24px;
            display: flex;
            align-items: center;
            height: 60px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 16px rgba(0, 0, 0, 0.3);
            border-bottom: 2px solid rgba(90, 143, 75, 0.4);
        }
        .navbar .logo {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.5px;
            margin-right: 28px;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .navbar .logo .logo-icon {
            font-size: 22px;
        }
        .navbar .logo span {
            color: #f9c74f;
        }
        .nav-tabs {
            display: flex;
            gap: 6px;
            flex: 1;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        .nav-tabs::-webkit-scrollbar {
            height: 0;
        }
        .nav-tab {
            padding: 12px 22px;
            border: none;
            background: transparent;
            color: #c5d5b8;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            border-radius: 10px;
            white-space: nowrap;
            transition: var(--transition);
            position: relative;
            min-height: 44px;
        }
        .nav-tab:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.08);
        }
        .nav-tab:active {
            transform: scale(0.96);
        }
        .nav-tab.active {
            color: #fff;
            background: var(--primary);
            font-weight: 600;
        }
        .bill-indicator {
            margin-left: auto;
            background: #f9c74f;
            color: #3e3226;
            padding: 8px 18px;
            border-radius: 22px;
            font-size: 15px;
            font-weight: 700;
            white-space: nowrap;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            min-height: 44px;
            display: flex;
            align-items: center;
        }
        .bill-indicator:hover {
            background: #fadc7a;
            transform: scale(1.03);
        }
        .bill-indicator:active {
            transform: scale(0.96);
        }

        /* ============ 主容器 ============ */
        .main-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 24px 16px 40px;
        }
        .page {
            display: none;
            animation: fadeSlideIn 0.3s ease;
        }
        .page.active {
            display: block;
        }
        @keyframes fadeSlideIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ============ 点餐页 ============ */
        .venue-banner {
            background: linear-gradient(135deg, #f9f5e9 0%, #fdf6ec 50%, #f9f0db 100%);
            border-radius: var(--radius);
            padding: 16px 20px;
            margin-bottom: 16px;
            border: 1px solid #e8dcc8;
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.04);
        }
        .venue-banner .venue-icon {
            font-size: 36px;
            flex-shrink: 0;
        }
        .venue-banner .venue-info {
            flex: 1;
            min-width: 150px;
        }
        .venue-banner .venue-name {
            font-weight: 700;
            font-size: 18px;
            color: #3e3226;
        }
        .venue-banner .venue-desc {
            font-size: 14px;
            color: #7a6f64;
            margin-top: 2px;
        }
        .category-bar {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 10px;
            margin-bottom: 20px;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
            align-items: center;
            flex-wrap: wrap;
        }
        .category-bar::-webkit-scrollbar {
            height: 0;
        }
        .category-chip {
            padding: 10px 20px;
            border-radius: 22px;
            border: 2px solid var(--border);
            background: #fffef9;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: var(--transition);
            color: var(--text);
            flex-shrink: 0;
            min-height: 44px;
        }
        .category-chip:hover {
            border-color: var(--green);
            color: var(--green);
        }
        .category-chip:active {
            transform: scale(0.96);
        }
        .category-chip.active {
            background: var(--green);
            color: #fff;
            border-color: var(--green);
            font-weight: 600;
        }
        .category-manage-btn {
            padding: 10px 18px;
            border-radius: 22px;
            border: 2px dashed var(--border);
            background: transparent;
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
            transition: var(--transition);
            color: var(--text-light);
            flex-shrink: 0;
            min-height: 44px;
        }
        .category-manage-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: #fffef9;
        }
        .category-manage-btn:active {
            transform: scale(0.96);
        }
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 16px;
            margin-bottom: 28px;
        }
        .menu-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 0 0 16px 0;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: var(--shadow);
            overflow: hidden;
            position: relative;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            border: 2px solid transparent;
        }
        .menu-card:hover {
            border-color: #c9b896;
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.1);
        }
        .menu-card:active {
            transform: scale(0.96);
        }
        .menu-card .img-wrap {
            width: 100%;
            aspect-ratio: 4 / 3;
            background: #f6f2e8;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .menu-card .img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .menu-card .img-wrap .no-img {
            font-size: 42px;
            color: #c4b5a3;
        }
        .menu-card .info {
            padding: 12px 14px 0;
            text-align: center;
        }
        .menu-card .name {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 6px;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .menu-card .price-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 4px;
        }
        .menu-card .price {
            color: #c0392b;
            font-weight: 700;
            font-size: 19px;
        }
        .menu-card .unit {
            font-size: 13px;
            color: var(--text-light);
        }
        .menu-card .qty-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--primary);
            color: #fff;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            box-shadow: 0 2px 10px rgba(230, 126, 34, 0.4);
            pointer-events: none;
        }
        .menu-card .qty-badge.hidden {
            display: none;
        }
        .menu-card.has-qty {
            border-color: var(--green);
            background: linear-gradient(135deg, #f6fcf4, #fffef9);
        }
        .menu-card.has-qty .name {
            color: var(--green-dark);
        }
        .empty-menu {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
            grid-column: 1 / -1;
        }
        .empty-menu .icon {
            font-size: 56px;
            display: block;
            margin-bottom: 12px;
        }

        /* ============ 当前账单卡片 ============ */
        .current-bill-card {
            background: #fffef9;
            border-radius: var(--radius);
            padding: 20px 22px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.12);
            margin-bottom: 24px;
            border: 3px solid var(--green);
            position: relative;
        }
        .current-bill-card.editing-mode {
            border-color: var(--primary);
            border-width: 3px;
            box-shadow: 0 4px 28px rgba(230, 126, 34, 0.2);
        }
        .editing-badge {
            display: none;
            position: absolute;
            top: -14px;
            right: 24px;
            background: var(--primary);
            color: #fff;
            padding: 6px 18px;
            border-radius: 14px;
            font-size: 13px;
            font-weight: 700;
        }
        .current-bill-card.editing-mode .editing-badge {
            display: block;
        }
        .current-bill-card .bill-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 14px;
        }
        .current-bill-card .bill-title {
            font-weight: 700;
            font-size: 19px;
        }
        .table-input-group {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .current-bill-card .bill-table-input {
            border: 2px solid var(--border);
            border-radius: 22px;
            padding: 10px 16px;
            font-size: 16px;
            width: 220px;
            outline: none;
            transition: var(--transition);
            background: #fffef9;
            font-weight: 600;
            min-height: 44px;
        }
        .current-bill-card .bill-table-input:focus {
            border-color: var(--green);
            box-shadow: 0 0 0 3px rgba(90, 143, 75, 0.08);
        }
        .current-bill-card .bill-table-input.empty-warning {
            border-color: #e74c3c;
            background: #fff5f5;
            animation: pulse-border 1.5s ease-in-out infinite;
        }
        @keyframes pulse-border {
            0%,
            100% {
                border-color: #e74c3c;
            }
            50% {
                border-color: #f5a09a;
            }
        }
        .table-reminder {
            display: none;
            color: #e74c3c;
            font-size: 13px;
            font-weight: 700;
            white-space: nowrap;
        }
        .table-reminder.show {
            display: inline;
        }
        .bill-items-list {
            max-height: 260px;
            overflow-y: auto;
            margin-bottom: 12px;
        }
        .bill-item-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #f2ede6;
            font-size: 15px;
            gap: 10px;
        }
        .bill-item-row .item-name {
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 15px;
        }
        .bill-item-row .qty-ctrl {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }
        .qty-ctrl button {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 2px solid var(--border);
            background: #fffef9;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            font-weight: 700;
            color: var(--text);
            -webkit-tap-highlight-color: transparent;
            line-height: 1;
        }
        .qty-ctrl button:hover {
            background: #f0eae2;
        }
        .qty-ctrl button:active {
            background: var(--green);
            color: #fff;
            border-color: var(--green);
        }
        .qty-ctrl .qty-num {
            min-width: 30px;
            text-align: center;
            font-weight: 700;
            font-size: 18px;
        }
        .bill-item-row .item-subtotal {
            font-weight: 700;
            min-width: 65px;
            text-align: right;
            color: #c0392b;
            flex-shrink: 0;
            font-size: 16px;
        }
        .bill-total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 14px;
            font-size: 20px;
            font-weight: 700;
            border-top: 2px dashed var(--border);
        }
        .bill-total-row .total-price {
            color: #c0392b;
            font-size: 28px;
        }
        .bill-actions {
            display: flex;
            gap: 12px;
            margin-top: 16px;
            flex-wrap: wrap;
            align-items: center;
        }
        .btn {
            padding: 12px 24px;
            border-radius: 25px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            white-space: nowrap;
            -webkit-tap-highlight-color: transparent;
            min-height: 48px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .btn:hover {
            transform: translateY(-1px);
        }
        .btn:active {
            transform: scale(0.96);
        }
        .btn-primary {
            background: var(--green);
            color: #fff;
            box-shadow: 0 2px 8px rgba(90, 143, 75, 0.25);
        }
        .btn-primary:hover {
            background: #4a7d3d;
        }
        .btn-warning {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 2px 8px rgba(230, 126, 34, 0.25);
        }
        .btn-warning:hover {
            background: #d35400;
        }
        .btn-outline {
            background: #fffef9;
            border: 2px solid var(--border);
            color: var(--text);
        }
        .btn-outline:hover {
            border-color: var(--green);
            color: var(--green);
        }
        .btn-danger {
            background: #fffef9;
            border: 2px solid #e0c8c0;
            color: #c0392b;
        }
        .btn-danger:hover {
            background: #fef5f4;
            border-color: #c0392b;
        }
        .btn-sm {
            padding: 8px 18px;
            font-size: 14px;
            border-radius: 20px;
            min-height: 38px;
        }
        .btn-xs {
            padding: 6px 14px;
            font-size: 13px;
            border-radius: 14px;
            font-weight: 600;
            min-height: 34px;
        }
        .cancel-edit-btn {
            display: none;
        }
        .current-bill-card.editing-mode .cancel-edit-btn {
            display: inline-flex;
        }
        .bill-note-group {
            margin-top: 12px;
        }
        .bill-note-group textarea {
            width: 100%;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 10px 14px;
            font-size: 14px;
            outline: none;
            resize: vertical;
            min-height: 44px;
            font-family: inherit;
            background: #fafaf8;
            transition: var(--transition);
        }
        .bill-note-group textarea:focus {
            border-color: var(--green);
            box-shadow: 0 0 0 3px rgba(90, 143, 75, 0.06);
        }
        .bill-note-group textarea::placeholder {
            color: #b5a794;
        }

        /* 状态标签 */
        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            white-space: nowrap;
        }
        .status-pending {
            background: #fef3cd;
            color: #856404;
        }
        .status-paid {
            background: #d4edda;
            color: #155724;
        }
        .status-cancelled {
            background: #f8d7da;
            color: #721c24;
        }

        /* ============ 管理页 ============ */
        .admin-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
        }
        .admin-header h2 {
            font-size: 22px;
        }
        .form-card {
            background: #fffef9;
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow);
            margin-bottom: 24px;
            border: 1px solid #ece5d5;
        }
        .form-card h3 {
            margin-bottom: 20px;
            font-size: 18px;
        }
        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            margin-bottom: 14px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
            min-width: 160px;
        }
        .form-group label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-light);
        }
        .form-group input,
        .form-group select {
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            border: 2px solid var(--border);
            font-size: 15px;
            outline: none;
            transition: var(--transition);
            background: #fafaf8;
            width: 100%;
            min-height: 44px;
        }
        .form-group input:focus,
        .form-group select:focus {
            border-color: var(--green);
            box-shadow: 0 0 0 3px rgba(90, 143, 75, 0.06);
        }
        .img-upload-area {
            border: 2px dashed var(--border);
            border-radius: var(--radius-sm);
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            background: #fafaf8;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 8px;
            min-height: 44px;
        }
        .img-upload-area:hover {
            border-color: var(--green);
            background: #fffef9;
        }
        .img-upload-area:active {
            transform: scale(0.98);
        }
        .img-upload-area img {
            max-width: 140px;
            max-height: 140px;
            border-radius: 8px;
            object-fit: cover;
        }
        .admin-menu-table {
            width: 100%;
            border-collapse: collapse;
            background: #fffef9;
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            font-size: 15px;
        }
        .admin-menu-table th,
        .admin-menu-table td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        .admin-menu-table th {
            background: #3d4f2e;
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            position: sticky;
            top: 0;
        }
        .admin-menu-table .thumb-cell {
            width: 60px;
        }
        .admin-menu-table .thumb-cell img {
            width: 48px;
            height: 48px;
            border-radius: 8px;
            object-fit: cover;
        }
        .table-wrap {
            overflow-x: auto;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid #ece5d5;
        }

        /* ============ 账单历史弹窗 ============ */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .modal {
            background: #fffef9;
            border-radius: var(--radius);
            padding: 28px;
            width: 100%;
            max-width: 860px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        .modal h3 {
            margin-bottom: 20px;
            font-size: 20px;
        }
        .modal-close {
            float: right;
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: var(--text-light);
            padding: 8px 12px;
            border-radius: 8px;
            line-height: 1;
            min-width: 44px;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-close:hover {
            background: #f0eae2;
        }

        .search-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .search-bar input {
            flex: 1;
            min-width: 200px;
            padding: 12px 16px;
            border-radius: 22px;
            border: 2px solid var(--border);
            font-size: 15px;
            outline: none;
            background: #fafaf8;
            min-height: 44px;
        }
        .search-bar input:focus {
            border-color: var(--green);
            box-shadow: 0 0 0 3px rgba(90, 143, 75, 0.06);
        }
        .search-bar select {
            padding: 12px 16px;
            border-radius: 22px;
            border: 2px solid var(--border);
            font-size: 15px;
            outline: none;
            background: #fafaf8;
            min-height: 44px;
        }

        .saved-bill-card {
            background: #fafaf8;
            border-radius: var(--radius-sm);
            padding: 16px 18px;
            margin-bottom: 12px;
            border: 1px solid var(--border);
            transition: var(--transition);
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            cursor: default;
        }
        .saved-bill-card:hover {
            border-color: #c9b896;
            background: #fffef9;
        }
        .saved-bill-card .bill-table-display {
            font-size: 22px;
            font-weight: 800;
            color: #2c3e50;
            background: #f0eae2;
            padding: 8px 16px;
            border-radius: 10px;
            min-width: 90px;
            text-align: center;
            white-space: nowrap;
            flex-shrink: 0;
            letter-spacing: 0.5px;
        }
        .saved-bill-card .bill-info-area {
            flex: 1;
            min-width: 150px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .saved-bill-card .bill-id-text {
            font-size: 13px;
            color: #aaa;
            font-weight: 400;
        }
        .saved-bill-card .bill-meta-text {
            font-size: 14px;
            color: var(--text-light);
        }
        .saved-bill-card .bill-total {
            font-weight: 700;
            color: #c0392b;
            font-size: 20px;
            min-width: 80px;
            text-align: right;
            flex-shrink: 0;
        }
        .saved-bill-card .bill-actions-row {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            flex-shrink: 0;
        }

        /* 页脚 */
        .footer-note {
            text-align: center;
            padding: 20px;
            color: #b5a794;
            font-size: 13px;
            margin-top: 10px;
        }
        .footer-note span {
            color: #5a8f4b;
            font-weight: 600;
        }

        .category-list-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            gap: 12px;
        }
        .category-list-item .cat-name {
            flex: 1;
            font-weight: 500;
            font-size: 15px;
        }
        .category-list-item .cat-count {
            font-size: 13px;
            color: var(--text-light);
            margin-right: 12px;
        }

        /* 响应式 - 平板横屏 */
        @media (min-width: 768px) and (max-width: 1199px) {
            .menu-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 16px;
            }
            .main-container {
                max-width: 100%;
                padding: 20px 24px 40px;
            }
        }
        /* 响应式 - 平板竖屏/大手机 */
        @media (min-width: 601px) and (max-width: 767px) {
            .menu-grid {
                grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
                gap: 12px;
            }
        }
        /* 响应式 - 手机 */
        @media (max-width: 600px) {
            .menu-grid {
                grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
                gap: 10px;
            }
            .menu-card .info {
                padding: 8px 8px 0;
            }
            .menu-card .name {
                font-size: 13px;

            .menu-card .price {

            .navbar {
                height: 50px;
                padding: 0 12px;

            .navbar .logo {

</head>
<body>

    <!-- 顶部导航 -->
    <nav class="navbar">
        <div class="logo">
            <span class="logo-icon">&#127957;</span> 柳条河<span>生态游乐场</span>
        </div>
        <div class="nav-tabs">
            <button class="nav-tab active" data-page="order">自助点餐</button>
            <button class="nav-tab" data-page="admin">菜品管理</button>
        </div>
        <button class="bill-indicator" id="billHistoryBtn" title="查看已存账单">账单记录</button>
    </nav>

    <!-- 主内容区 -->
    <div class="main-container">

        <!-- ==================== 点餐页 ==================== -->
        <div class="page active" id="page-order">
            <div class="venue-banner">
                <span class="venue-icon">&#127794;</span>
                <div class="venue-info">
                    <div class="venue-name">柳条河生态游乐场</div>
                    <div class="venue-desc">野外自助烧烤 · 亲近自然 · 炭火飘香</div>
                </div>
            </div>

            <!-- 分类筛选 -->
            <div class="category-bar" id="categoryBar">
                <button class="category-chip active" data-cat="all">全部</button>
            </div>

            <!-- 菜品网格 -->
            <div class="menu-grid" id="menuGrid"></div>

            <!-- 当前账单 -->
            <div class="current-bill-card" id="currentBillCard">
                <span class="editing-badge">正在修改账单</span>
                <div class="bill-header">
                    <span class="bill-title">当前账单</span>
                    <div class="table-input-group">
                        <input type="text" class="bill-table-input empty-warning" id="billTableInput" placeholder="请输入桌号/手机号" value="">
                        <span class="table-reminder show" id="tableReminder">请填写标识！</span>
                    </div>
                </div>
                <div class="bill-items-list" id="billItemsList">
                    <div style="text-align:center;color:#aaa;padding:30px;">还没有添加菜品，点击上方卡片加入</div>
                </div>
                <div class="bill-total-row">
                    <span>合计</span>
                    <span class="total-price" id="billTotal">0.00</span>
                </div>
                <div class="bill-note-group">
                    <textarea id="billNoteInput" placeholder="整单备注（如：不加辣、快点上、人数等）" rows="1"></textarea>
                </div>
                <div class="bill-actions">
                    <button class="btn btn-primary" id="saveBillBtn">保存账单</button>
                    <button class="btn btn-outline" id="clearBillBtn">清空当前</button>
                    <button class="btn btn-outline cancel-edit-btn" id="cancelEditBtn">取消修改</button>
                </div>
            </div>
        </div>

        <!-- ==================== 管理页 ==================== -->
        <div class="page" id="page-admin">
            <div class="admin-header">
                <h2>菜品管理 <span style="font-size:14px;color:var(--text-light);">-- 柳条河生态游乐场</span></h2>
                <button class="btn btn-primary" id="showAddFormBtn">添加菜品</button>
            </div>

            <!-- 添加/编辑表单 -->
            <div class="form-card" id="menuFormCard" style="display:none;">
                <h3 id="formTitle">添加菜品</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>菜品名称 *</label>
                        <input type="text" id="menuName" placeholder="如：秘制羊肉串">
                    </div>
                    <div class="form-group" style="max-width:120px;">
                        <label>价格 *</label>
                        <input type="number" id="menuPrice" placeholder="0" min="0" step="0.01">
                    </div>
                    <div class="form-group" style="max-width:100px;">
                        <label>单位 *</label>
                        <select id="menuUnit">
                            <option value="串">串</option>
                            <option value="份">份</option>
                            <option value="斤">斤</option>
                            <option value="把">把</option>
                            <option value="个">个</option>
                            <option value="条">条</option>
                            <option value="盘">盘</option>
                        </select>
                    </div>
                    <div class="form-group" style="max-width:160px;">
                        <label>分类</label>
                        <input type="text" id="menuCategory" placeholder="如：秘制肉类" list="categorySuggest">
                        <datalist id="categorySuggest"></datalist>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>图片（可选）</label>
                        <div class="img-upload-area" id="imgUploadArea">
                            <span id="imgPlaceholder">点击上传图片</span>
                            <img id="imgPreview" src="" alt="预览" style="display:none;">
                        </div>
                        <input type="file" id="imgFileInput" accept="image/*" style="display:none;">
                        <button type="button" class="btn btn-sm btn-outline" id="removeImgBtn" style="margin-top:6px;display:none;">移除图片</button>
                    </div>
                </div>
                <div style="display:flex;gap:10px;flex-wrap:wrap;">
                    <button class="btn btn-primary" id="saveMenuBtn">保存菜品</button>
                    <button class="btn btn-outline" id="cancelFormBtn">取消</button>
                </div>
                <input type="hidden" id="editingMenuId" value="">
            </div>

            <!-- 菜品列表 -->
            <div class="table-wrap">
                <table class="admin-menu-table">
                    <thead>
                        <tr>
                            <th>图片</th>
                            <th>名称</th>
                            <th>价格</th>
                            <th>单位</th>
                            <th>分类</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="adminMenuTbody"></tbody>
                </table>
                <div id="adminEmpty" style="text-align:center;padding:40px;color:#aaa;background:#fffef9;">暂无菜品，点击"添加菜品"开始</div>
            </div>
        </div>
    </div>

    <div class="footer-note">
        <span>柳条河生态游乐场</span> · 野外自助烧烤 · 享受自然美味
    </div>

    <!-- ==================== 账单历史弹窗 ==================== -->
    <div class="modal-overlay" id="billModal" style="display:none;">
        <div class="modal" id="billModalContent">
            <button class="modal-close" id="closeBillModal">&times;</button>
            <h3>账单记录 -- 柳条河生态游乐场</h3>

            <!-- 查询栏 -->
            <div class="search-bar">
                <input type="text" id="billSearchInput" placeholder="搜索桌号/手机号/账单编号...">
                <select id="billStatusFilter">
                    <option value="all">全部状态</option>
                    <option value="pending">未结账</option>
                    <option value="paid">已结账</option>
                    <option value="cancelled">已取消</option>
                </select>
                <button class="btn btn-sm btn-outline" id="exportBillsBtn">导出CSV</button>
            </div>

            <div id="savedBillsList"></div>
            <div style="margin-top:16px;display:flex;gap:10px;flex-wrap:wrap;">
                <button class="btn btn-danger btn-sm" id="clearAllBillsBtn">清空所有账单</button>
                <button class="btn btn-outline btn-sm" id="closeBillModalBtn2">关闭</button>
            </div>
        </div>
    </div>

    <!-- ==================== 分类管理弹窗 ==================== -->
    <div class="modal-overlay" id="categoryModal" style="display:none;">
        <div class="modal" style="max-width:500px;">
            <button class="modal-close" id="closeCategoryModal">&times;</button>
            <h3>管理菜品分类</h3>
            <div style="display:flex;gap:8px;margin-bottom:16px;">
                <input type="text" id="newCategoryInput" placeholder="输入新分类名称" style="flex:1;padding:10px 14px;border-radius:20px;border:1.5px solid var(--border);font-size:14px;outline:none;">
                <button class="btn btn-primary btn-sm" id="addCategoryBtn">添加</button>
            </div>
            <div id="categoryListContainer" style="max-height:300px;overflow-y:auto;"></div>
            <div style="margin-top:12px;">
                <button class="btn btn-outline btn-sm" id="closeCategoryModalBtn2">关闭</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ============ 数据存储 ============
            const STORAGE_KEY_MENU = 'bbq_menu_liutiaohe_v3';
            const STORAGE_KEY_BILLS = 'bbq_bills_liutiaohe_v3';
            const STORAGE_KEY_CURRENT_BILL = 'bbq_current_bill_liutiaohe_v3';
            const STORAGE_KEY_CATEGORIES = 'bbq_categories_liutiaohe_v3';

            function loadData(key, fallback) {
                try {
                    const raw = localStorage.getItem(key);
                    return raw ? JSON.parse(raw) : fallback;
                } catch (e) {
                    return fallback;
                }
            }

            function saveData(key, data) {
                try {
                    localStorage.setItem(key, JSON.stringify(data));
                } catch (e) {
                    alert('存储空间不足，请清理一些旧账单或压缩图片。');
                }
            }

            let menu = loadData(STORAGE_KEY_MENU, []);
            let savedBills = loadData(STORAGE_KEY_BILLS, []);
            let customCategories = loadData(STORAGE_KEY_CATEGORIES, []);
            let currentBill = loadData(STORAGE_KEY_CURRENT_BILL, {
                table: '',
                items: [],
                note: ''
            });

            // 记录是否正在编辑已有账单（存储被编辑账单的id）
            let editingBillId = null;

            let tempImageData = '';
            let editingId = null;

            // ============ DOM引用 ============
            const $ = (sel) => document.querySelector(sel);
            const $$ = (sel) => document.querySelectorAll(sel);

            const navTabs = $$('.nav-tab');
            const pageOrder = $('#page-order');
            const pageAdmin = $('#page-admin');
            const categoryBar = $('#categoryBar');
            const menuGrid = $('#menuGrid');
            const billItemsList = $('#billItemsList');
            const billTotal = $('#billTotal');
            const billTableInput = $('#billTableInput');
            const tableReminder = $('#tableReminder');
            const currentBillCard = $('#currentBillCard');
            const billHistoryBtn = $('#billHistoryBtn');
            const billModal = $('#billModal');
            const savedBillsList = $('#savedBillsList');
            const adminMenuTbody = $('#adminMenuTbody');
            const adminEmpty = $('#adminEmpty');
            const menuFormCard = $('#menuFormCard');
            const formTitle = $('#formTitle');
            const imgUploadArea = $('#imgUploadArea');
            const imgFileInput = $('#imgFileInput');
            const imgPreview = $('#imgPreview');
            const imgPlaceholder = $('#imgPlaceholder');
            const removeImgBtn = $('#removeImgBtn');
            const editingMenuIdInput = $('#editingMenuId');
            const categorySuggest = $('#categorySuggest');
            const categoryModal = $('#categoryModal');

            // ============ 页面切换 ============
            navTabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    const pageName = tab.dataset.page;
                    navTabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    if (pageName === 'order') {
                        pageOrder.classList.add('active');
                        pageAdmin.classList.remove('active');
                        renderOrderPage();
                    } else {
                        pageAdmin.classList.add('active');
                        pageOrder.classList.remove('active');
                        renderAdminPage();
                    }
                });
            });

            // ============ 工具函数 ============
            function generateBillId() {
                const now = new Date();
                const y = now.getFullYear();
                const m = String(now.getMonth() + 1).padStart(2, '0');
                const d = String(now.getDate()).padStart(2, '0');
                const h = String(now.getHours()).padStart(2, '0');
                const min = String(now.getMinutes()).padStart(2, '0');
                // 格式：年月日-时分，更有辨识度
                return `${y}${m}${d}-${h}${min}`;
            }

            function getAllCategories() {
                const cats = new Set(customCategories);
                menu.forEach(m => {
                    if (m.category && m.category.trim()) cats.add(m.category.trim());
                });
                return Array.from(cats).sort();
            }

            function getCurrentBillItemMap() {
                const map = {};
                currentBill.items.forEach(item => {
                    map[item.menuId] = item;
                });
                return map;
            }

            function calcBillTotal() {
                return currentBill.items.reduce((sum, item) => sum + item.price * item.qty, 0);
            }

            function escapeHtml(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            function getStatusText(status) {
                const map = { pending: '未结账', paid: '已结账', cancelled: '已取消' };
                return map[status] || '未结账';
            }

            function getStatusClass(status) {
                const map = { pending: 'status-pending', paid: 'status-paid', cancelled: 'status-cancelled' };
                return map[status] || 'status-pending';
            }

            function updateTableWarning() {
                const val = billTableInput.value.trim();
                if (!val) {
                    billTableInput.classList.add('empty-warning');
                    tableReminder.classList.add('show');
                } else {
                    billTableInput.classList.remove('empty-warning');
                    tableReminder.classList.remove('show');
                }
            }

            function isEditingBill() {
                return editingBillId !== null;
            }

            function updateEditModeUI() {
                if (isEditingBill()) {
                    currentBillCard.classList.add('editing-mode');
                    $('#saveBillBtn').textContent = '确认修改并保存';
                    $('#saveBillBtn').classList.add('btn-warning');
                    $('#saveBillBtn').classList.remove('btn-primary');
                } else {
                    currentBillCard.classList.remove('editing-mode');
                    $('#saveBillBtn').textContent = '保存账单';
                    $('#saveBillBtn').classList.add('btn-primary');
                    $('#saveBillBtn').classList.remove('btn-warning');
                }
            }

            // ============ 渲染点餐页 ============
            function renderOrderPage() {
                renderCategoryBar();
                renderMenuGrid();
                renderCurrentBill();
                billTableInput.value = currentBill.table || '';
                const noteInput = document.getElementById('billNoteInput');
                if (noteInput) noteInput.value = currentBill.note || '';
                updateTableWarning();
                updateEditModeUI();
            }

            function renderCategoryBar() {
                const categories = getAllCategories();
                let html = '<button class="category-chip active" data-cat="all">全部</button>';
                categories.forEach(cat => {
                    html +=
                        `<button class="category-chip" data-cat="${escapeHtml(cat)}">${escapeHtml(cat)}</button>`;
                });
                html += '<button class="category-manage-btn" id="manageCategoryBtn" title="管理分类">管理分类</button>';
                categoryBar.innerHTML = html;

                categoryBar.querySelectorAll('.category-chip').forEach(chip => {
                    chip.addEventListener('click', () => {
                        categoryBar.querySelectorAll('.category-chip').forEach(c => c
                            .classList.remove('active'));
                        chip.classList.add('active');
                        renderMenuGrid(chip.dataset.cat === 'all' ? null : chip.dataset.cat);
                    });
                });

                const manageBtn = $('#manageCategoryBtn');
                if (manageBtn) {
                    manageBtn.addEventListener('click', openCategoryModal);
                }
            }

            function renderMenuGrid(filterCat = null) {
                const activeChip = categoryBar.querySelector('.category-chip.active');
                const currentCat = activeChip ? (activeChip.dataset.cat === 'all' ? null : activeChip.dataset.cat) :
                    null;
                const cat = filterCat !== undefined ? filterCat : currentCat;

                let filtered = menu;
                if (cat) {
                    filtered = menu.filter(m => (m.category || '').trim() === cat);
                }

                if (filtered.length === 0) {
                    menuGrid.innerHTML =
                        '<div class="empty-menu"><span class="icon">&#127831;</span>暂无菜品<br>请先在「菜品管理」中添加野外烧烤食材</div>';
                    return;
                }

                const billItemMap = getCurrentBillItemMap();

                menuGrid.innerHTML = filtered.map(m => {
                    const qty = billItemMap[m.id] ? billItemMap[m.id].qty : 0;
                    const imgHtml = m.image ?
                        `<img src="${m.image}" alt="${escapeHtml(m.name)}" loading="lazy">` :
                        '<span class="no-img">&#127831;</span>';
                    return `
                <div class="menu-card" data-menu-id="${m.id}">
                  <div class="img-wrap">${imgHtml}</div>
                  <div class="qty-badge ${qty === 0 ? 'hidden' : ''}">${qty}</div>
                  <div class="info">
                    <div class="name">${escapeHtml(m.name)}</div>
                    <div class="price-row">
                      <span class="price">${m.price.toFixed(2)}</span>
                      <span class="unit">/ ${escapeHtml(m.unit)}</span>
                    </div>
                  </div>
                </div>`;
                }).join('');

                menuGrid.querySelectorAll('.menu-card').forEach(card => {
                    card.addEventListener('click', () => {
                        const menuId = parseInt(card.dataset.menuId);
                        addToBill(menuId);
                    });
                });
            }

            function vibrate() {
                if (navigator.vibrate) navigator.vibrate(8);
            }

            function addToBill(menuId) {
                const menuItem = menu.find(m => m.id === menuId);
                if (!menuItem) return;
                const existing = currentBill.items.find(i => i.menuId === menuId);
                if (existing) {
                    existing.qty += 1;
                } else {
                    currentBill.items.push({
                        menuId: menuItem.id,
                        name: menuItem.name,
                        price: menuItem.price,
                        unit: menuItem.unit,
                        qty: 1
                    });
                }
                vibrate();
                saveCurrentBill();
                renderCurrentBillOnly();
                updateMenuGridQtyBadges();
            }

            function renderCurrentBill() {
                renderCurrentBillOnly();
            }

            function renderCurrentBillOnly() {
                if (currentBill.items.length === 0) {
                    billItemsList.innerHTML =
                        '<div style="text-align:center;color:#aaa;padding:30px;">还没有添加菜品，点击上方卡片加入</div>';
                } else {
                    billItemsList.innerHTML = currentBill.items.map((item, idx) => `
                <div class="bill-item-row">
                  <span class="item-name">${escapeHtml(item.name)} (${escapeHtml(item.unit)})</span>
                  <div class="qty-ctrl">
                    <button data-action="dec" data-idx="${idx}">-</button>
                    <span class="qty-num">${item.qty}</span>
                    <button data-action="inc" data-idx="${idx}">+</button>
                  </div>
                  <span class="item-subtotal">${(item.price * item.qty).toFixed(2)}</span>
                </div>`).join('');

                    billItemsList.querySelectorAll('button').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            const idx = parseInt(btn.dataset.idx);
                            const action = btn.dataset.action;
                            if (action === 'inc') {
                                currentBill.items[idx].qty += 1;
                                vibrate();
                            } else if (action === 'dec') {
                                currentBill.items[idx].qty -= 1;
                                vibrate();
                                if (currentBill.items[idx].qty <= 0) {
                                    currentBill.items.splice(idx, 1);
                                }
                            }
                            saveCurrentBill();
                            renderOrderPage();
                        });
                    });
                }
                billTotal.textContent = calcBillTotal().toFixed(2);
            }

            // 图片上传
            imgUploadArea.addEventListener('click', () => imgFileInput.click());
            imgFileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                if (!file.type.startsWith('image/')) {
                    alert('请选择图片文件。');
                    return;
                }
                const reader = new FileReader();
                reader.onload = function(ev) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const maxSize = 300;
                        let w = img.width;
                        let h = img.height;
                        if (w > h && w > maxSize) { h = h * maxSize / w;
                            w = maxSize; } else if (h > maxSize) { w = w * maxSize / h;
                            h = maxSize; }
                        canvas.width = w;
                        canvas.height = h;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, w, h);
                        tempImageData = canvas.toDataURL('image/jpeg', 0.7);
                        imgPreview.src = tempImageData;
                        imgPreview.style.display = 'block';
                        imgPlaceholder.style.display = 'none';
                        removeImgBtn.style.display = 'inline-block';
                    };
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
                imgFileInput.value = '';
            });

                if (editingId !== null) {

                    });
