<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>柳条河生态游乐场 - 野外自助烧烤点餐</title>
    <style>
        :root {
            /* 修改：自然生态配色 */
            --primary: #e67e22;
            /* 温暖的炭火橙 */
            --primary-dark: #d35400;
            /* 深橙色 */
            --bg: #f4f1ea;
            /* 米白原木底色 */
            --card-bg: #fffef9;
            /* 卡片暖白 */
            --text: #3e3226;
            /* 深棕色 */
            --text-light: #7a6f64;
            /* 浅棕灰 */
            --border: #e0d7c4;
            /* 原木边框 */
            --shadow: 0 2px 12px rgba(62, 50, 38, 0.08);
            --radius: 14px;
            --radius-sm: 10px;
            --transition: 0.2s ease;
            --green: #5a8f4b;
            /* 生态绿点缀 */
            --green-dark: #3d6b32;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            /* 修改：添加自然纹理背景 */
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(90, 143, 75, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(230, 126, 34, 0.04) 0%, transparent 50%);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ============ 顶部导航 ============ */
        .navbar {
            /* 修改：深绿色生态风 */
            background: linear-gradient(135deg, #3d4f2e 0%, #2c3a1f 100%);
            padding: 0 20px;
            display: flex;
            align-items: center;
            height: 56px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 16px rgba(0, 0, 0, 0.3);
            border-bottom: 2px solid rgba(90, 143, 75, 0.4);
        }
        .navbar .logo {
            font-size: 19px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.5px;
            margin-right: 30px;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        /* 修改：Logo图标 */
        .navbar .logo .logo-icon {
            font-size: 22px;
        }
        .navbar .logo span {
            color: #f9c74f;
            /* 金黄色点缀 */
        }
        .nav-tabs {
            display: flex;
            gap: 4px;
            flex: 1;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        .nav-tabs::-webkit-scrollbar {
            height: 0;
        }
        .nav-tab {
            padding: 10px 20px;
            border: none;
            background: transparent;
            color: #c5d5b8;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            border-radius: 8px;
            white-space: nowrap;
            transition: var(--transition);
            position: relative;
        }
        .nav-tab:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.08);
        }
        .nav-tab.active {
            color: #fff;
            background: var(--primary);
            font-weight: 600;
        }
        .bill-indicator {
            margin-left: auto;
            background: #f9c74f;
            color: #3e3226;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            cursor: pointer;
            transition: var(--transition);
            border: none;
        }
        .bill-indicator:hover {
            background: #fadc7a;
            transform: scale(1.03);
        }

        /* ============ 主容器 ============ */
        .main-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 24px 16px 40px;
        }
        .page {
            display: none;
            animation: fadeSlideIn 0.3s ease;
        }
        .page.active {
            display: block;
        }
        @keyframes fadeSlideIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ============ 点餐页 ============ */
        /* 修改：添加场地氛围横幅 */
        .venue-banner {
            background: linear-gradient(135deg, #f9f5e9 0%, #fdf6ec 50%, #f9f0db 100%);
            border-radius: var(--radius);
            padding: 16px 20px;
            margin-bottom: 18px;
            border: 1px solid #e8dcc8;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.04);
        }
        .venue-banner .venue-icon {
            font-size: 36px;
            flex-shrink: 0;
        }
        .venue-banner .venue-info {
            flex: 1;
            min-width: 150px;
        }
        .venue-banner .venue-name {
            font-weight: 700;
            font-size: 16px;
            color: #3e3226;
        }
        .venue-banner .venue-desc {
            font-size: 13px;
            color: #7a6f64;
            margin-top: 2px;
        }
        .venue-banner .venue-tag {
            display: inline-block;
            background: #e8f0e2;
            color: #5a8f4b;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 4px;
        }
        .category-bar {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 8px;
            margin-bottom: 20px;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
        }
        .category-bar::-webkit-scrollbar {
            height: 0;
        }
        .category-chip {
            padding: 8px 18px;
            border-radius: 20px;
            border: 1.5px solid var(--border);
            background: #fffef9;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            transition: var(--transition);
            color: var(--text);
            flex-shrink: 0;
        }
        .category-chip:hover {
            border-color: var(--green);
            color: var(--green);
        }
        .category-chip.active {
            background: var(--green);
            color: #fff;
            border-color: var(--green);
            font-weight: 600;
        }
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
            gap: 14px;
            margin-bottom: 24px;
        }
        .menu-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 0 0 14px 0;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: var(--shadow);
            overflow: hidden;
            position: relative;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            /* 修改：增加边框 */
            border: 1px solid #ece5d5;
        }
        .menu-card:hover {
            border-color: #c9b896;
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.1);
        }
        .menu-card:active {
            transform: scale(0.96);
        }
        .menu-card .img-wrap {
            width: 100%;
            aspect-ratio: 1 / 1;
            /* 修改：自然底色 */
            background: #f6f2e8;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .menu-card .img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .menu-card .img-wrap .no-img {
            font-size: 42px;
            color: #c4b5a3;
        }
        .menu-card .info {
            padding: 10px 12px 0;
            text-align: center;
        }
        .menu-card .name {
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 4px;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .menu-card .price-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            margin-top: 4px;
        }
        .menu-card .price {
            color: #c0392b;
            /* 价格用红色突出 */
            font-weight: 700;
            font-size: 17px;
        }
        .menu-card .unit {
            font-size: 12px;
            color: var(--text-light);
        }
        .menu-card .qty-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: var(--primary);
            color: #fff;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            box-shadow: 0 2px 8px rgba(230, 126, 34, 0.4);
            pointer-events: none;
        }
        .menu-card .qty-badge.hidden {
            display: none;
        }
        .empty-menu {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
            grid-column: 1 / -1;
        }
        .empty-menu .icon {
            font-size: 64px;
            display: block;
            margin-bottom: 12px;
        }

        /* ============ 当前账单卡片 ============ */
        .current-bill-card {
            background: #fffef9;
            border-radius: var(--radius);
            padding: 18px 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
            /* 修改：绿色边框呼应生态主题 */
            border: 2px solid var(--green);
            position: relative;
        }
        .current-bill-card .bill-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 12px;
        }
        .current-bill-card .bill-title {
            font-weight: 700;
            font-size: 17px;
        }
        .current-bill-card .bill-table-input {
            border: 1.5px solid var(--border);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 14px;
            width: 130px;
            outline: none;
            transition: var(--transition);
            background: #fafaf8;
        }
        .current-bill-card .bill-table-input:focus {
            border-color: var(--green);
            box-shadow: 0 0 0 3px rgba(90, 143, 75, 0.08);
        }
        .bill-items-list {
            max-height: 220px;
            overflow-y: auto;
            margin-bottom: 10px;
        }
        .bill-item-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #f2ede6;
            font-size: 14px;
            gap: 8px;
        }
        .bill-item-row .item-name {
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .bill-item-row .qty-ctrl {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }
        .qty-ctrl button {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 1.5px solid var(--border);
            background: #fffef9;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            font-weight: 600;
            color: var(--text);
            -webkit-tap-highlight-color: transparent;
        }
        .qty-ctrl button:hover {
            background: #f0eae2;
        }
        .qty-ctrl .qty-num {
            min-width: 24px;
            text-align: center;
            font-weight: 600;
            font-size: 15px;
        }
        .bill-item-row .item-subtotal {
            font-weight: 600;
            min-width: 50px;
            text-align: right;
            color: #c0392b;
            flex-shrink: 0;
        }
        .bill-total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 10px;
            font-size: 18px;
            font-weight: 700;
            border-top: 2px dashed var(--border);
        }
        .bill-total-row .total-price {
            color: #c0392b;
            font-size: 24px;
        }
        .bill-actions {
            display: flex;
            gap: 10px;
            margin-top: 14px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 10px 20px;
            border-radius: 25px;
            border: none;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            white-space: nowrap;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-primary {
            background: var(--green);
            color: #fff;
        }
        .btn-primary:hover {
            background: #4a7d3d;
        }
        .btn-outline {
            background: #fffef9;
            border: 1.5px solid var(--border);
            color: var(--text);
        }
        .btn-outline:hover {
            border-color: var(--green);
            color: var(--green);
        }
        .btn-danger {
            background: #fffef9;
            border: 1.5px solid #e0c8c0;
            color: #c0392b;
        }
        .btn-danger:hover {
            background: #fef5f4;
            border-color: #c0392b;
        }
        .btn-sm {
            padding: 6px 14px;
            font-size: 13px;
            border-radius: 20px;
        }

        /* ============ 管理页 ============ */
        .admin-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }
        .admin-header h2 {
            font-size: 20px;
        }
        .form-card {
            background: #fffef9;
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
            border: 1px solid #ece5d5;
        }
        .form-card h3 {
            margin-bottom: 16px;
            font-size: 16px;
        }
        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 12px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex: 1;
            min-width: 140px;
        }
        .form-group label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-light);
        }
        .form-group input,
        .form-group select {
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            border: 1.5px solid var(--border);
            font-size: 14px;
            outline: none;
            transition: var(--transition);
            background: #fafaf8;
            width: 100%;
        }
        .form-group input:focus,
        .form-group select:focus {
            border-color: var(--green);
            box-shadow: 0 0 0 3px rgba(90, 143, 75, 0.06);
        }
        .img-upload-area {
            border: 2px dashed var(--border);
            border-radius: var(--radius-sm);
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            background: #fafaf8;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 6px;
        }
        .img-upload-area:hover {
            border-color: var(--green);
            background: #fffef9;
        }
        .img-upload-area img {
            max-width: 120px;
            max-height: 120px;
            border-radius: 8px;
            object-fit: cover;
        }
        .admin-menu-table {
            width: 100%;
            border-collapse: collapse;
            background: #fffef9;
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            font-size: 14px;
        }
        .admin-menu-table th,
        .admin-menu-table td {
            padding: 12px 14px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        .admin-menu-table th {
            background: #3d4f2e;
            color: #fff;
            font-weight: 600;
            font-size: 13px;
            position: sticky;
            top: 0;
        }
        .admin-menu-table .thumb-cell {
            width: 50px;
        }
        .admin-menu-table .thumb-cell img {
            width: 42px;
            height: 42px;
            border-radius: 6px;
            object-fit: cover;
        }
        .table-wrap {
            overflow-x: auto;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            border: 1px solid #ece5d5;
        }

        /* ============ 账单历史弹窗 ============ */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .modal {
            background: #fffef9;
            border-radius: var(--radius);
            padding: 24px;
            width: 100%;
            max-width: 700px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }
        .modal h3 {
            margin-bottom: 16px;
            font-size: 18px;
        }
        .saved-bill-card {
            background: #fafaf8;
            border-radius: var(--radius-sm);
            padding: 14px 16px;
            margin-bottom: 10px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .saved-bill-card:hover {
            border-color: var(--green);
            background: #fffef9;
        }
        .saved-bill-card .bill-meta {
            font-size: 13px;
            color: var(--text-light);
        }
        .saved-bill-card .bill-total {
            font-weight: 700;
            color: #c0392b;
            font-size: 16px;
        }
        .modal-close {
            float: right;
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            color: var(--text-light);
            padding: 4px 8px;
            border-radius: 6px;
        }
        .modal-close:hover {
            background: #f0eae2;
        }

        /* 页脚 */
        .footer-note {
            text-align: center;
            padding: 20px;
            color: #b5a794;
            font-size: 13px;
            margin-top: 10px;
        }
        .footer-note span {
            color: #5a8f4b;
            font-weight: 600;
        }

        /* 响应式 */
        @media (max-width: 600px) {
            .menu-grid {
                grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
                gap: 10px;
            }
            .menu-card .info {
                padding: 8px 8px 0;
            }
            .menu-card .name {
                font-size: 13px;
            }
            .menu-card .price {
                font-size: 15px;
            }
            .navbar .logo {
                font-size: 15px;
                margin-right: 8px;
            }
            .nav-tab {
                padding: 8px 12px;
                font-size: 13px;
            }
            .venue-banner {
                padding: 12px 14px;
            }
            .venue-banner .venue-icon {
                font-size: 28px;
            }
            .venue-banner .venue-name {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <!-- 顶部导航 -->
    <nav class="navbar">
        <!-- 修改：柳条河生态游乐场 Logo -->
        <div class="logo">
            <span class="logo-icon">🏕️</span> 柳条河<span>生态游乐场</span>
        </div>
        <div class="nav-tabs">
            <button class="nav-tab active" data-page="order">🍖 自助点餐</button>
            <button class="nav-tab" data-page="admin">⚙️ 菜品管理</button>
        </div>
        <button class="bill-indicator" id="billHistoryBtn" title="查看已存账单">📝 账单记录</button>
    </nav>

    <!-- 主内容区 -->
    <div class="main-container">

        <!-- ==================== 点餐页 ==================== -->
        <div class="page active" id="page-order">
            <!-- 修改：添加场地氛围横幅 -->
            <div class="venue-banner">
                <span class="venue-icon">🌲🔥</span>
                <div class="venue-info">
                    <div class="venue-name">柳条河生态游乐场</div>
                    <div class="venue-desc">野外自助烧烤 · 亲近自然 · 炭火飘香</div>
                </div>
                <span class="venue-tag">🏕️ 自助烧烤区</span>
            </div>

            <!-- 分类筛选 -->
            <div class="category-bar" id="categoryBar">
                <button class="category-chip active" data-cat="all">全部</button>
            </div>

            <!-- 菜品网格 -->
            <div class="menu-grid" id="menuGrid"></div>

            <!-- 当前账单 -->
            <div class="current-bill-card" id="currentBillCard">
                <div class="bill-header">
                    <span class="bill-title">🧾 当前账单</span>
                    <input type="text" class="bill-table-input" id="billTableInput" placeholder="烧烤台号/备注" value="">
                </div>
                <div class="bill-items-list" id="billItemsList">
                    <div style="text-align:center;color:#aaa;padding:30px;">还没有添加菜品，点击上方卡片加入</div>
                </div>
                <div class="bill-total-row">
                    <span>合计</span>
                    <span class="total-price" id="billTotal">¥0.00</span>
                </div>
                <div class="bill-actions">
                    <button class="btn btn-primary" id="saveBillBtn">💾 保存账单</button>
                    <button class="btn btn-outline" id="clearBillBtn">🗑️ 清空当前</button>
                </div>
            </div>
        </div>

        <!-- ==================== 管理页 ==================== -->
        <div class="page" id="page-admin">
            <div class="admin-header">
                <h2>⚙️ 菜品管理 <span style="font-size:14px;color:var(--text-light);">— 柳条河生态游乐场</span></h2>
                <button class="btn btn-primary" id="showAddFormBtn">+ 添加菜品</button>
            </div>

            <!-- 添加/编辑表单 -->
            <div class="form-card" id="menuFormCard" style="display:none;">
                <h3 id="formTitle">添加菜品</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>菜品名称 *</label>
                        <input type="text" id="menuName" placeholder="如：秘制羊肉串">
                    </div>
                    <div class="form-group" style="max-width:120px;">
                        <label>价格 *</label>
                        <input type="number" id="menuPrice" placeholder="0" min="0" step="0.01">
                    </div>
                    <div class="form-group" style="max-width:100px;">
                        <label>单位 *</label>
                        <select id="menuUnit">
                            <option value="串">串</option>
                            <option value="份">份</option>
                            <option value="斤">斤</option>
                            <option value="把">把</option>
                            <option value="个">个</option>
                            <option value="条">条</option>
                            <option value="盘">盘</option>
                        </select>
                    </div>
                    <div class="form-group" style="max-width:150px;">
                        <label>分类</label>
                        <input type="text" id="menuCategory" placeholder="如：秘制肉类" list="categorySuggest">
                        <datalist id="categorySuggest"></datalist>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>图片（可选）</label>
                        <div class="img-upload-area" id="imgUploadArea">
                            <span id="imgPlaceholder">📷 点击上传野外烧烤实拍图</span>
                            <img id="imgPreview" src="" alt="预览" style="display:none;">
                        </div>
                        <input type="file" id="imgFileInput" accept="image/*" style="display:none;">
                        <button type="button" class="btn btn-sm btn-outline" id="removeImgBtn" style="margin-top:6px;display:none;">移除图片</button>
                    </div>
                </div>
                <div style="display:flex;gap:10px;flex-wrap:wrap;">
                    <button class="btn btn-primary" id="saveMenuBtn">💾 保存菜品</button>
                    <button class="btn btn-outline" id="cancelFormBtn">取消</button>
                </div>
                <input type="hidden" id="editingMenuId" value="">
            </div>

            <!-- 菜品列表 -->
            <div class="table-wrap">
                <table class="admin-menu-table">
                    <thead>
                        <tr>
                            <th>图片</th>
                            <th>名称</th>
                            <th>价格</th>
                            <th>单位</th>
                            <th>分类</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="adminMenuTbody"></tbody>
                </table>
                <div id="adminEmpty" style="text-align:center;padding:40px;color:#aaa;background:#fffef9;">暂无菜品，点击"添加菜品"开始</div>
            </div>
        </div>
    </div>

    <!-- 修改：页脚 -->
    <div class="footer-note">
        🏕️ <span>柳条河生态游乐场</span> · 野外自助烧烤 · 享受自然美味 🔥
    </div>

    <!-- 账单历史弹窗 -->
    <div class="modal-overlay" id="billModal" style="display:none;">
        <div class="modal">
            <button class="modal-close" id="closeBillModal">✕</button>
            <h3>📝 已保存账单 — 柳条河生态游乐场</h3>
            <div id="savedBillsList"></div>
            <div style="margin-top:16px;display:flex;gap:10px;flex-wrap:wrap;">
                <button class="btn btn-danger btn-sm" id="clearAllBillsBtn">🗑️ 清空所有账单</button>
                <button class="btn btn-outline btn-sm" id="closeBillModalBtn2">关闭</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ============ 数据存储 ============
            const STORAGE_KEY_MENU = 'bbq_menu_liutiaohe';
            const STORAGE_KEY_BILLS = 'bbq_bills_liutiaohe';
            const STORAGE_KEY_CURRENT_BILL = 'bbq_current_bill_liutiaohe';

            function loadData(key, fallback) {
                try {
                    const raw = localStorage.getItem(key);
                    return raw ? JSON.parse(raw) : fallback;
                } catch (e) {
                    return fallback;
                }
            }

            function saveData(key, data) {
                try {
                    localStorage.setItem(key, JSON.stringify(data));
                } catch (e) {
                    alert('存储空间不足，请清理一些旧账单或压缩图片。');
                }
            }

            // 菜品数据
            let menu = loadData(STORAGE_KEY_MENU, []);
            // 所有已保存账单
            let savedBills = loadData(STORAGE_KEY_BILLS, []);
            // 当前正在编辑的账单
            let currentBill = loadData(STORAGE_KEY_CURRENT_BILL, {
                table: '',
                items: [] // { menuId, name, price, unit, qty }
            });

            // 当前图片Base64（用于管理表单）
            let tempImageData = '';
            let editingId = null; // 正在编辑的菜品ID

            // ============ DOM引用 ============
            const $ = (sel) => document.querySelector(sel);
            const $$ = (sel) => document.querySelectorAll(sel);

            const navTabs = $$('.nav-tab');
            const pageOrder = $('#page-order');
            const pageAdmin = $('#page-admin');
            const categoryBar = $('#categoryBar');
            const menuGrid = $('#menuGrid');
            const billItemsList = $('#billItemsList');
            const billTotal = $('#billTotal');
            const billTableInput = $('#billTableInput');
            const currentBillCard = $('#currentBillCard');
            const billHistoryBtn = $('#billHistoryBtn');
            const billModal = $('#billModal');
            const savedBillsList = $('#savedBillsList');
            const adminMenuTbody = $('#adminMenuTbody');
            const adminEmpty = $('#adminEmpty');
            const menuFormCard = $('#menuFormCard');
            const formTitle = $('#formTitle');
            const imgUploadArea = $('#imgUploadArea');
            const imgFileInput = $('#imgFileInput');
            const imgPreview = $('#imgPreview');
            const imgPlaceholder = $('#imgPlaceholder');
            const removeImgBtn = $('#removeImgBtn');
            const editingMenuIdInput = $('#editingMenuId');
            const categorySuggest = $('#categorySuggest');

            // ============ 页面切换 ============
            navTabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    const pageName = tab.dataset.page;
                    navTabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    if (pageName === 'order') {
                        pageOrder.classList.add('active');
                        pageAdmin.classList.remove('active');
                        renderOrderPage();
                    } else {
                        pageAdmin.classList.add('active');
                        pageOrder.classList.remove('active');
                        renderAdminPage();
                    }
                });
            });

            // ============ 工具函数 ============
            function generateBillId() {
                const now = new Date();
                const dateStr = now.toISOString().slice(0, 10).replace(/-/g, '');
                const seq = savedBills.length + 1;
                // 修改：账单编号加场地前缀
                return `LTH-${dateStr}-${String(seq).padStart(3, '0')}`;
            }

            function getCategories() {
                const cats = new Set();
                menu.forEach(m => {
                    if (m.category && m.category.trim()) cats.add(m.category.trim());
                });
                return Array.from(cats).sort();
            }

            function getCurrentBillItemMap() {
                const map = {};
                currentBill.items.forEach(item => {
                    map[item.menuId] = item;
                });
                return map;
            }

            function calcBillTotal() {
                return currentBill.items.reduce((sum, item) => sum + item.price * item.qty, 0);
            }

            // ============ 渲染点餐页 ============
            function renderOrderPage() {
                renderCategoryBar();
                renderMenuGrid();
                renderCurrentBill();
                billTableInput.value = currentBill.table || '';
            }

            function renderCategoryBar() {
                const categories = getCategories();
                let html = '<button class="category-chip active" data-cat="all">全部</button>';
                categories.forEach(cat => {
                    html +=
                        `<button class="category-chip" data-cat="${escapeHtml(cat)}">${escapeHtml(cat)}</button>`;
                });
                categoryBar.innerHTML = html;

                // 绑定点击
                categoryBar.querySelectorAll('.category-chip').forEach(chip => {
                    chip.addEventListener('click', () => {
                        categoryBar.querySelectorAll('.category-chip').forEach(c => c
                            .classList.remove('active'));
                        chip.classList.add('active');
                        renderMenuGrid(chip.dataset.cat === 'all' ? null : chip.dataset.cat);
                    });
                });
            }

            function renderMenuGrid(filterCat = null) {
                const activeChip = categoryBar.querySelector('.category-chip.active');
                const currentCat = activeChip ? (activeChip.dataset.cat === 'all' ? null : activeChip.dataset.cat) :
                    null;
                const cat = filterCat !== undefined ? filterCat : currentCat;

                let filtered = menu;
                if (cat) {
                    filtered = menu.filter(m => (m.category || '').trim() === cat);
                }

                if (filtered.length === 0) {
                    menuGrid.innerHTML =
                        '<div class="empty-menu"><span class="icon">🍖</span>暂无菜品<br>请先在「菜品管理」中添加野外烧烤食材</div>';
                    return;
                }

                const billItemMap = getCurrentBillItemMap();

                menuGrid.innerHTML = filtered.map(m => {
                    const qty = billItemMap[m.id] ? billItemMap[m.id].qty : 0;
                    const imgHtml = m.image ?
                        `<img src="${m.image}" alt="${escapeHtml(m.name)}" loading="lazy">` :
                        '<span class="no-img">🍢</span>';
                    return `
                <div class="menu-card" data-menu-id="${m.id}">
                  <div class="img-wrap">${imgHtml}</div>
                  <div class="qty-badge ${qty === 0 ? 'hidden' : ''}">${qty}</div>
                  <div class="info">
                    <div class="name">${escapeHtml(m.name)}</div>
                    <div class="price-row">
                      <span class="price">¥${m.price.toFixed(2)}</span>
                      <span class="unit">/ ${escapeHtml(m.unit)}</span>
                    </div>
                  </div>
                </div>`;
                }).join('');

                // 绑定点击
                menuGrid.querySelectorAll('.menu-card').forEach(card => {
                    card.addEventListener('click', () => {
                        const menuId = parseInt(card.dataset.menuId);
                        addToBill(menuId);
                    });
                });
            }

            function addToBill(menuId) {
                const menuItem = menu.find(m => m.id === menuId);
                if (!menuItem) return;
                const existing = currentBill.items.find(i => i.menuId === menuId);
                if (existing) {
                    existing.qty += 1;
                } else {
                    currentBill.items.push({
                        menuId: menuItem.id,
                        name: menuItem.name,
                        price: menuItem.price,
                        unit: menuItem.unit,
                        qty: 1
                    });
                }
                saveCurrentBill();
                renderOrderPage();
                // 滚动到账单
                currentBillCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }

            function renderCurrentBill() {
                if (currentBill.items.length === 0) {
                    billItemsList.innerHTML =
                        '<div style="text-align:center;color:#aaa;padding:30px;">还没有添加菜品，点击上方卡片加入</div>';
                } else {
                    billItemsList.innerHTML = currentBill.items.map((item, idx) => `
                <div class="bill-item-row">
                  <span class="item-name">${escapeHtml(item.name)} (${escapeHtml(item.unit)})</span>
                  <div class="qty-ctrl">
                    <button data-action="dec" data-idx="${idx}">−</button>
                    <span class="qty-num">${item.qty}</span>
                    <button data-action="inc" data-idx="${idx}">+</button>
                  </div>
                  <span class="item-subtotal">¥${(item.price * item.qty).toFixed(2)}</span>
                </div>`).join('');

                    // 绑定数量调整
                    billItemsList.querySelectorAll('button').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            const idx = parseInt(btn.dataset.idx);
                            const action = btn.dataset.action;
                            if (action === 'inc') {
                                currentBill.items[idx].qty += 1;
                            } else if (action === 'dec') {
                                currentBill.items[idx].qty -= 1;
                                if (currentBill.items[idx].qty <= 0) {
                                    currentBill.items.splice(idx, 1);
                                }
                            }
                            saveCurrentBill();
                            renderOrderPage();
                        });
                    });
                }
                billTotal.textContent = `¥${calcBillTotal().toFixed(2)}`;
            }

            function saveCurrentBill() {
                currentBill.table = billTableInput.value;
                saveData(STORAGE_KEY_CURRENT_BILL, currentBill);
            }

            // 保存账单
            $('#saveBillBtn').addEventListener('click', () => {
                if (currentBill.items.length === 0) {
                    alert('当前账单为空，请先添加菜品。');
                    return;
                }
                const table = billTableInput.value.trim() || '未备注烧烤台';
                const bill = {
                    id: generateBillId(),
                    table: table,
                    items: JSON.parse(JSON.stringify(currentBill.items)),
                    total: calcBillTotal(),
                    createTime: new Date().toLocaleString('zh-CN'),
                    venue: '柳条河生态游乐场', // 修改：记录场地
                };
                savedBills.unshift(bill);
                saveData(STORAGE_KEY_BILLS, savedBills);
                // 清空当前账单
                currentBill = { table: '', items: [] };
                saveData(STORAGE_KEY_CURRENT_BILL, currentBill);
                billTableInput.value = '';
                renderOrderPage();
                alert(`账单 ${bill.id} 已保存！\n柳条河生态游乐场 · 野外自助烧烤`);
            });

            // 清空当前账单
            $('#clearBillBtn').addEventListener('click', () => {
                if (currentBill.items.length === 0) return;
                if (confirm('确定清空当前账单吗？')) {
                    currentBill = { table: '', items: [] };
                    saveData(STORAGE_KEY_CURRENT_BILL, currentBill);
                    billTableInput.value = '';
                    renderOrderPage();
                }
            });

            // 台号输入实时保存
            billTableInput.addEventListener('input', () => {
                currentBill.table = billTableInput.value;
                saveData(STORAGE_KEY_CURRENT_BILL, currentBill);
            });

            // ============ 账单历史弹窗 ============
            billHistoryBtn.addEventListener('click', () => {
                renderSavedBills();
                billModal.style.display = 'flex';
            });

            function closeBillModal() {
                billModal.style.display = 'none';
            }
            $('#closeBillModal').addEventListener('click', closeBillModal);
            $('#closeBillModalBtn2').addEventListener('click', closeBillModal);
            billModal.addEventListener('click', (e) => {
                if (e.target === billModal) closeBillModal();
            });

            function renderSavedBills() {
                if (savedBills.length === 0) {
                    savedBillsList.innerHTML =
                        '<div style="text-align:center;color:#aaa;padding:30px;">还没有保存的账单</div>';
                } else {
                    savedBillsList.innerHTML = savedBills.map(b => `
                <div class="saved-bill-card" data-bill-id="${b.id}">
                  <div>
                    <strong>${escapeHtml(b.id)}</strong>
                    <span class="bill-meta"> | ${escapeHtml(b.table)} | ${b.createTime} | ${b.items.length}种菜品</span>
                  </div>
                  <span class="bill-total">¥${b.total.toFixed(2)}</span>
                </div>`).join('');

                    // 点击账单可查看详情
                    savedBillsList.querySelectorAll('.saved-bill-card').forEach(card => {
                        card.addEventListener('click', () => {
                            const billId = card.dataset.billId;
                            const bill = savedBills.find(b => b.id === billId);
                            if (bill) {
                                const detail = bill.items.map(i =>
                                    `${i.name} ×${i.qty}${i.unit} = ¥${(i.price*i.qty).toFixed(2)}`
                                ).join('\n');
                                alert(
                                    `柳条河生态游乐场 · 野外自助烧烤\n\n账单: ${bill.id}\n烧烤台: ${bill.table}\n时间: ${bill.createTime}\n\n${detail}\n\n合计: ¥${bill.total.toFixed(2)}`
                                    );
                            }
                        });
                    });
                }
            }

            $('#clearAllBillsBtn').addEventListener('click', () => {
                if (savedBills.length === 0) return;
                if (confirm(`确定删除全部 ${savedBills.length} 条账单记录吗？此操作不可恢复。`)) {
                    savedBills = [];
                    saveData(STORAGE_KEY_BILLS, savedBills);
                    renderSavedBills();
                }
            });

            // ============ 渲染管理页 ============
            function renderAdminPage() {
                renderAdminTable();
                updateCategorySuggest();
            }

            function renderAdminTable() {
                if (menu.length === 0) {
                    adminMenuTbody.innerHTML = '';
                    adminEmpty.style.display = 'block';
                } else {
                    adminEmpty.style.display = 'none';
                    adminMenuTbody.innerHTML = menu.map(m => `
                <tr>
                  <td class="thumb-cell">${m.image ? `<img src="${m.image}" alt="">` : '—'}</td>
                  <td><strong>${escapeHtml(m.name)}</strong></td>
                  <td>¥${m.price.toFixed(2)}</td>
                  <td>${escapeHtml(m.unit)}</td>
                  <td>${escapeHtml(m.category || '—')}</td>
                  <td>
                    <button class="btn btn-sm btn-outline edit-menu-btn" data-id="${m.id}">✏️ 编辑</button>
                    <button class="btn btn-sm btn-danger del-menu-btn" data-id="${m.id}">🗑️ 删除</button>
                  </td>
                </tr>`).join('');

                    // 绑定编辑
                    adminMenuTbody.querySelectorAll('.edit-menu-btn').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const id = parseInt(btn.dataset.id);
                            editMenuItem(id);
                        });
                    });
                    // 绑定删除
                    adminMenuTbody.querySelectorAll('.del-menu-btn').forEach(btn => {
                        btn.addEventListener('click', () => {
                            const id = parseInt(btn.dataset.id);
                            deleteMenuItem(id);
                        });
                    });
                }
            }

            function updateCategorySuggest() {
                const cats = getCategories();
                categorySuggest.innerHTML = cats.map(c => `<option value="${escapeHtml(c)}">`).join('');
            }

            function resetForm() {
                $('#menuName').value = '';
                $('#menuPrice').value = '';
                $('#menuUnit').value = '串';
                $('#menuCategory').value = '';
                tempImageData = '';
                imgPreview.style.display = 'none';
                imgPlaceholder.style.display = 'block';
                removeImgBtn.style.display = 'none';
                editingMenuIdInput.value = '';
                editingId = null;
                formTitle.textContent = '添加菜品';
                menuFormCard.style.display = 'none';
            }

            $('#showAddFormBtn').addEventListener('click', () => {
                resetForm();
                menuFormCard.style.display = 'block';
                menuFormCard.scrollIntoView({ behavior: 'smooth' });
            });

            $('#cancelFormBtn').addEventListener('click', resetForm);

            function editMenuItem(id) {
                const item = menu.find(m => m.id === id);
                if (!item) return;
                editingId = id;
                $('#menuName').value = item.name;
                $('#menuPrice').value = item.price;
                $('#menuUnit').value = item.unit;
                $('#menuCategory').value = item.category || '';
                tempImageData = item.image || '';
                editingMenuIdInput.value = id;
                formTitle.textContent = '编辑菜品';
                menuFormCard.style.display = 'block';
                if (tempImageData) {
                    imgPreview.src = tempImageData;
                    imgPreview.style.display = 'block';
                    imgPlaceholder.style.display = 'none';
                    removeImgBtn.style.display = 'inline-block';
                } else {
                    imgPreview.style.display = 'none';
                    imgPlaceholder.style.display = 'block';
                    removeImgBtn.style.display = 'none';
                }
                menuFormCard.scrollIntoView({ behavior: 'smooth' });
            }

            function deleteMenuItem(id) {
                if (!confirm('确定删除这个菜品吗？')) return;
                menu = menu.filter(m => m.id !== id);
                // 同时从当前账单中移除
                currentBill.items = currentBill.items.filter(i => i.menuId !== id);
                saveData(STORAGE_KEY_MENU, menu);
                saveCurrentBill();
                renderAdminPage();
                renderOrderPage();
            }

            // 图片上传
            imgUploadArea.addEventListener('click', () => imgFileInput.click());
            imgFileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;
                if (!file.type.startsWith('image/')) {
                    alert('请选择图片文件。');
                    return;
                }
                // 压缩并转Base64
                const reader = new FileReader();
                reader.onload = function(ev) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const maxSize = 300;
                        let w = img.width;
                        let h = img.height;
                        if (w > h && w > maxSize) { h = h * maxSize / w;
                            w = maxSize; } else if (h > maxSize) { w = w * maxSize / h;
                            h = maxSize; }
                        canvas.width = w;
                        canvas.height = h;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, w, h);
                        tempImageData = canvas.toDataURL('image/jpeg', 0.7);
                        imgPreview.src = tempImageData;
                        imgPreview.style.display = 'block';
                        imgPlaceholder.style.display = 'none';
                        removeImgBtn.style.display = 'inline-block';
                    };
                    img.src = ev.target.result;
                };
                reader.readAsDataURL(file);
                imgFileInput.value = '';
            });

            removeImgBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                tempImageData = '';
                imgPreview.style.display = 'none';
                imgPlaceholder.style.display = 'block';
                removeImgBtn.style.display = 'none';
            });

            // 保存菜品
            $('#saveMenuBtn').addEventListener('click', () => {
                const name = $('#menuName').value.trim();
                const priceStr = $('#menuPrice').value.trim();
                const unit = $('#menuUnit').value;
                const category = $('#menuCategory').value.trim();

                if (!name) { alert('请输入菜品名称。');
                    return; }
                if (!priceStr || isNaN(parseFloat(priceStr)) || parseFloat(priceStr) < 0) {
                    alert('请输入有效的价格。');
                    return;
                }
                const price = parseFloat(parseFloat(priceStr).toFixed(2));

                if (editingId !== null) {
                    // 编辑
                    const idx = menu.findIndex(m => m.id === editingId);
                    if (idx !== -1) {
                        menu[idx].name = name;
                        menu[idx].price = price;
                        menu[idx].unit = unit;
                        menu[idx].category = category;
                        menu[idx].image = tempImageData;
                        // 更新当前账单中对应的菜品信息
                        currentBill.items.forEach(item => {
                            if (item.menuId === editingId) {
                                item.name = name;
                                item.price = price;
                                item.unit = unit;
                            }
                        });
                    }
                } else {
                    // 新增
                    const newId = menu.length > 0 ? Math.max(...menu.map(m => m.id)) + 1 : 1;
                    menu.push({
                        id: newId,
                        name,
                        price,
                        unit,
                        category,
                        image: tempImageData
                    });
                }
                saveData(STORAGE_KEY_MENU, menu);
                saveCurrentBill();
                resetForm();
                renderAdminPage();
                renderOrderPage();
                alert('菜品已保存！');
            });

            function escapeHtml(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            // ============ 初始化 ============
            function init() {
                // 修改：示例菜品适配野外烧烤场景
                if (menu.length === 0) {
                    menu = [
                        { id: 1, name: '秘制羊肉串', price: 4, unit: '串', category: '招牌烤肉', image: '' },
                        { id: 2, name: '炭烤牛肉串', price: 5, unit: '串', category: '招牌烤肉', image: '' },
